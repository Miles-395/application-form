<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"rel="stylesheet">
</head>
<style>
    body{
        background-image: url(https://i.pinimg.com/1200x/a2/c3/da/a2c3da32c5f0806bba9227fa5b61ce4e.jpg);
        font-family: Arial, sans-serif;
    }

    h1{
        text-align: center;
        color: black;
        font-weight: bold;
    }

    fieldset{
        border: 2px solid #28a745;
        padding: 20px;
    }

    legend{
        font-size: 1.5em;
        font-weight: bold;
        color: #007bff;
    }

    input{
        margin: 5px;
        padding: 8px;
    }

    #f11{
        float: left;
        width: 50%;
    }

    #f13{
        float: right;
        width: 50%;
    }
    .desc-sec{
        border: 2px solid #28a745;
        border-radius: 10px;
        padding: 20px;
        margin-top: 20px;
    }
    .description{
        text-align: center;
        color: black;
    }
    #reset-btn{
        background-color: #dc3545;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
        margin: 10px;
        cursor: pointer;
    }
    #submit-btn{
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
        margin: 10px;
        cursor: pointer;
    }
</style>
<body>
    <h1>Application Form</h1>
    <form name="contactFORM" action="/action_page.php" onsubmit="return validateForm()">
        <div id="f11">
            <fieldset>
                <legend>Contact Information</legend>

                <div class="mb-3">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username"><br><br>
                </div>

                <div class="mb-3">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email"><br><br>
                </div>

                <div class="mb-3">
                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone" name="phone"><br><br>
                </div>

                <div class="mb-3">
                    <label for="physical-address">Physical Address:</label>
                    <input type="text" id="physical-address" name="physical_address"><br><br>
                </div>
            </fieldset>

            <fieldset>
                <legend>Relocation</legend>

                <input type="radio" id="relocate-yes" name="relocation" value="yes">
                <label for="relocate-yes">Yes</label><br><br>
                <input type="radio" id="relocate-no" name="relocation" value="no">
                <label for="relocate-no">No</label><br><br>
            </fieldset>
        </div>
        <div  id="f12">
            <fieldset>
                <legend>Employment type</legend>

                <input type="radio" id="part-time-contract" name="employment_type" value="part-time-contract">
                <label for="part-time-contract">Part-time Contract</label><br><br>
                <input type="radio" id="part-time-permanent" name="employment_type" value="part-time-permanent">
                <label for="part-time-permanent">Part-time Permanent</label><br><br>
                <input type="radio" id="full-time-contract" name="employment_type" value="full-time-contract">
                <label for="full-time-contract">Full-time Contract</label><br><br>
                <input type="radio" id="full-time-permanent" name="employment_type" value="full-time-permanent">
                <label for="full-time-permanent">Full-time Permanent</label><br><br>

            </fieldset>   
        
            <fieldset>
                <legend>Areas of interest</legend>
            
                <input type="checkbox" id="Account Executive" name="job_positions" value="Account Executive">
                <label for="Account Executive">Account Executive</label><br><br>
                <input type="checkbox" id="Business Development" name="job_positions" value="Business Development">
                <label for="Business Development">Business Development</label><br><br>
                <input type="checkbox" id="Inside Sales" name="job_positions" value="Inside Sales">
                <label for="Inside Sales">Inside Sales</label><br><br>
                <input type="checkbox" id="Sales Manager" name="job_positions" value="Sales Manager">
                <label for="Sales Manager">Sales Manager</label><br><br>
                <input type="checkbox" id="VP Sales" name="job_positions" value="VP Sales">
                <label for="VP Sales">VP Sales</label><br><br>
            </fieldset>
        </div>

        <div class="desc-sec">
            <fiealdset>
                <legend class="description">Describe why you are suitable for the role</legend>
                <textarea class="form-control" rows="5" id="comment" name="text"></textarea>
            </fiealdset>
        </div>
        <input type="reset" id="reset-btn" value="Reset">
        <input type="submit" id="submit-btn" value="Submit">
        
</body>
<script>

function validateForm(){
    let username = document.forms["contactFORM"]["username"].value;
    let email = document.forms["contactFORM"]["email"].value;
    let phone = document.forms["contactFORM"]["phone"].value;
    
    if(username == ""|| email == "" || phone == ""){
        alert("All fields must be filled out");
        return false;
    }
}
</script>
</html>
